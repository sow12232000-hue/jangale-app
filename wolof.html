<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafu Wolof</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }
        .phone-container {
            max-width: 412px;
            width: 100%;
            background-color: #fcfcfd;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        /* Kaw ba (Header) */
        .header {
            background-color: #1a1a1a;
            color: white;
            padding: 18px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .back-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .logo-tag {
            background-color: #10b981;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* 🚀 Buntu scroll horizontal bi lay laqal Leson 2 */
        .lesons-wrapper {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            width: 100%;
            padding-bottom: 20px;
        }
        /* Ngir dindi barre scroll bu ñaaw bi */
        .lesons-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* Boite u Leson bu nekk */
        .leson-section {
            min-width: 100%;
            box-sizing: border-box;
            scroll-snap-align: start;
            padding: 10px 20px;
        }

        /* Titre u Leson bi */
        .leson-title-box {
            background-color: #0284c7;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.15);
        }
        .leson-title-box.consonnes {
            background-color: #10b981; /* Wirgo bu bees ngir koonsoo yi */
        }

        /* Grid 2 colonnes melni sa image bi */
        .araf-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* Card yi melni sa natal dëgg */
        .araf-card {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .araf-card:active {
            transform: scale(0.96);
            background-color: #f1f5f9;
        }
        .araf-main {
            font-size: 3.4rem;
            font-weight: 900;
            color: #0f172a;
            margin: 0 0 20px 0;
            line-height: 1;
        }
        /* Bouton Audio circular bu weex bu am shadow */
        .audio-btn {
            position: absolute;
            top: 25px;
            right: 20px;
            background-color: #f1f5f9;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #64748b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }
        .misaal-container {
            width: 100%;
        }
        .misaal-label {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .misaal-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0284c7;
        }
        /* Teytalu swipe / weccu ci suuf */
        .swipe-hint {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">⬅️</button>
        <div>jàngale</div>
        <div class="logo-tag">JÀNGALE</div>
    </div>

    <div class="swipe-hint">Pousseel loxol ci wet ⬅️ ➡️ ngir guiss yeneen Leson</div>

    <!-- 🚀 Buntu scroll horizontal bi -->
    <div class="lesons-wrapper">
        
        <!-- SECTION 1: VOYELLES (Feeñ na saasa) -->
        <div class="leson-section">
            <div class="leson-title-box">(Leson 1) - Voyel yi</div>
            <div class="araf-grid" id="voyelles-container"></div>
        </div>

        <!-- SECTION 2: CONSONNES (Mu ngi laqu ci wetu ndijoor) -->
        <div class="leson-section">
            <div class="leson-title-box consonnes">(Leson 2) - Koonsoo yi</div>
            <div class="araf-grid" id="consonnes-container"></div>
        </div>

    </div>
</div>

<script>
    // Limu Voyel yi (Leson 1)
    const voyelles = [
        { araf: "A", misaal: "Amoo", wax: "Ah", son: "audio/araf_a.mp3" },
        { araf: "E", misaal: "Eskee", wax: "É", son: "audio/araf_e.mp3" },
        { araf: "Ë", misaal: "Ëtt", wax: "Eu", son: "audio/araf_ee.mp3" },
        { araf: "I", misaal: "Ite", wax: "I", son: "audio/araf_i.mp3" },
        { araf: "O", misaal: "Oolo", wax: "O", son: "audio/araf_o.mp3" },
        { araf: "U", misaal: "Ubi", wax: "U", son: "audio/araf_u.mp3" }
    ];

    // Limu Koonsoo yi (Leson 2)
    const consonnes = [
        { araf: "B", misaal: "Boon", wax: "Bë", son: "audio/araf_b.mp3" },
        { araf: "C", misaal: "Ceeb", wax: "Cë", son: "audio/araf_c.mp3" },
        { araf: "D", misaal: "Daba", wax: "Dë", son: "audio/araf_d.mp3" },
        { araf: "F", misaal: "Fas", wax: "Fë", son: "audio/araf_f.mp3" },
        { araf: "G", misaal: "Góor", wax: "Gë", son: "audio/araf_g.mp3" },
        { araf: "H", misaal: "Habsatou", wax: "Hë", son: "audio/araf_h.mp3" },
        { araf: "J", misaal: "Jërëjëf", wax: "Jë", son: "audio/araf_j.mp3" },
        { araf: "K", misaal: "Kër", wax: "Kë", son: "audio/araf_k.mp3" },
        { araf: "L", misaal: "Lakk", wax: "Lë", son: "audio/araf_l.mp3" },
        { araf: "M", misaal: "Mbaar", wax: "Më", son: "audio/araf_m.mp3" },
        { araf: "N", misaal: "Nit", wax: "Në", son: "audio/araf_n.mp3" },
        { araf: "Ñ", misaal: "Ñari", wax: "Ñë", son: "audio/araf_gn.mp3" },
        { araf: "Ŋ", misaal: "Ŋam", wax: "Ŋë", son: "audio/araf_ng.mp3" },
        { araf: "P", misaal: "Picc", wax: "Pë", son: "audio/araf_p.mp3" },
        { araf: "Q", misaal: "Qaat", wax: "Që", son: "audio/araf_q.mp3" },
        { araf: "R", misaal: "Ragal", wax: "Rë", son: "audio/araf_r.mp3" },
        { araf: "S", misaal: "Suf", wax: "Së", son: "audio/araf_s.mp3" },
        { araf: "T", misaal: "Tund", wax: "Të", son: "audio/araf_t.mp3" },
        { araf: "W", misaal: "Waaw", wax: "Wë", son: "audio/araf_w.mp3" },
        { araf: "X", misaal: "Xale", wax: "Xë", son: "audio/araf_x.mp3" },
        { araf: "Y", misaal: "Yaram", wax: "Yë", son: "audio/araf_y.mp3" }
    ];

    // Fonction buy sàkk card yi ci biir genn section
    function sakkCardYi(liste, containerId) {
        const container = document.getElementById(containerId);
        liste.forEach(item => {
            const card = document.createElement("div");
            card.className = "araf-card";
            
            card.innerHTML = `
                <h1 class="araf-main">${item.araf}</h1>
                <button class="audio-btn">🔊</button>
                <div class="misaal-container">
                    <div class="misaal-label">Misaal:</div>
                    <div class="misaal-text">${item.misaal}</div>
                </div>
            `;
            
            card.onclick = () => {
                playAudio(item.son, item.wax);
            };
            
            container.appendChild(card);
        });
    }

    // Fonction buy déglu son bi
    function playAudio(audioPath, arafWax) {
        const audio = new Audio(audioPath);
        audio.play().catch(err => {
            console.log("Audio file amul, sàkk naa robot text-to-speech.");
            const utterance = new SpeechSynthesisUtterance(arafWax);
            utterance.lang = 'fr-FR'; 
            window.speechSynthesis.speak(utterance);
        });
    }

    // Dóoral liggéey bi ngir ñaari leson yi bën yoon
    sakkCardYi(voyelles, "voyelles-container");
    sakkCardYi(consonnes, "consonnes-container");
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leson 2 - Baat yu am solo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .phone-container {
            max-width: 412px;
            width: 100%;
            background-color: #f8f9fa;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        /* Kaw ba (Header) */
        .header {
            background-color: #0b0c10;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .back-btn {
            background-color: #3a7bc8;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        /* Tittle u Leson bi */
        .leson-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
            padding: 20px 10px 10px 10px;
            margin: 0;
        }
        .divider {
            height: 2px;
            background-color: #cbd5e1;
            width: 80%;
            margin: 0 auto 20px auto;
        }
        /* Grid u baat yi */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px 20px 20px;
        }
        /* Card u baat yi */
        .word-card {
            background-color: white;
            border: none;
            border-radius: 18px;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s, background-color 0.2s;
        }
        .word-card:active {
            transform: scale(0.95);
            background-color: #e8f4f8;
        }
        .word-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 1.1rem;
            color: #000;
            font-weight: bold;
            max-width: 75%;
        }
        .prononciation {
            font-weight: normal;
            color: #475569;
            font-size: 0.95rem;
        }
        .wolof-translation {
            color: #0284c7;
            font-size: 1.15rem;
        }
        .audio-icon {
            font-size: 1.4rem;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">⬅️</button>
        <div>jàngale</div>
        <div style="background: #27ae60; padding: 5px; border-radius: 4px; font-size: 0.8rem;">JÀNGALE</div>
    </div>

    <!-- Leson Title -->
    <h2 class="leson-title">Leson 2 : Baat yu am solo yu bees</h2>
    <div class="divider"></div>

    <!-- Fi baat yi di guéné -->
    <div class="words-grid" id="words-container"></div>
</div>

<script>
    // Liste u baat yi dëppoo ak sa nataal
    const baatYi = [
        { francais: "Montagne", fonetik: "mõñtañ", wolof: "Tund", audio: "audio_fr/montagne.mp3" },
        { francais: "Bouteille", fonetik: "butey", wolof: "Bitel", audio: "audio_fr/bouteille.mp3" },
        { francais: "Chapeau", fonetik: "sapoo", wolof: "Mbaxana", audio: "audio_fr/chapeau.mp3" },
        { francais: "Cuisine", fonetik: "kiwisin", wolof: "Waañ", audio: "audio_fr/cuisine.mp3" },
        { francais: "Garçon", fonetik: "garsõ", wolof: "Xale bu góor", audio: "audio_fr/garcon.mp3" },
        { francais: "Grenouille", fonetik: "grenuy", wolof: "Mbott", audio: "audio_fr/grenouille.mp3" },
        { francais: "Oiseau", fonetik: "wazo", wolof: "Picc", audio: "audio_fr/oiseau.mp3" },
        { francais: "Papillon", fonetik: "papiyõ", wolof: "Lëp-lëp", audio: "audio_fr/papillon.mp3" },
        { francais: "Téléphone", fonetik: "telefon", wolof: "Telefoon", audio: "audio_fr/telephone.mp3" }
    ];

    const container = document.getElementById("words-container");

    // Sàkk card yi ci biir grid bi
    baatYi.forEach(item => {
        const card = document.createElement("button");
        card.className = "word-card";
        
        card.innerHTML = `
            <div class="word-info">
                <div>${item.francais}</div>
                <div class="prononciation">(${item.fonetik})</div>
                <div class="wolof-translation">-> ${item.wolof}</div>
            </div>
            <span class="audio-icon">🔊</span>
        `;
        
        // Bu ñu cuqé card bi mu play audio
        card.onclick = () => {
            playAudio(item.audio);
        };
        
        container.appendChild(card);
    });

    // Fonction buy dëgglu son bi
    function playAudio(path) {
        const audio = new Audio(path);
        audio.play().catch(err => console.log("Audio bi manul a jouer: " + path));
    }
</script>

</body>
</html>

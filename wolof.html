<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arafu Wolof</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .phone-container {
            max-width: 412px;
            width: 100%;
            background-color: #fcfcfd;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        /* Kaw ba (Header) */
        .header {
            background-color: #1a1a1a;
            color: white;
            padding: 18px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .back-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .logo-tag {
            background-color: #10b981;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        /* Buntu tàqalé Leson yi */
        .tabs-container {
            display: flex;
            gap: 15px;
            padding: 20px 20px 10px 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #e2e8f0;
            background-color: white;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: #0284c7;
            color: white;
            border-color: #0284c7;
            box-shadow: 0 4px 12 rgba(2, 132, 199, 0.2);
        }
        /* Liste vertical bu yaatu (1 colonne) ngir mu toftaloo ci suuf */
        .araf-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px 20px 25px 20px;
        }
        /* Card yi toftaloo ci suuf */
        .araf-card {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .araf-card:active {
            transform: scale(0.98);
            background-color: #f1f5f9;
        }
        /* Wetu loxo cammoñ: Araf ak Misaal */
        .card-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .araf-main {
            font-size: 3rem;
            font-weight: 900;
            color: #0f172a;
            margin: 0;
            width: 50px; /* Ngir araf yi alignment bi baax */
        }
        .misaal-container {
            display: flex;
            flex-direction: column;
        }
        .misaal-label {
            font-size: 0.95rem;
            color: #94a3b8;
        }
        .misaal-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: #0284c7;
            margin: 0;
        }
        /* Wetu loxo ndijoor: Bouton Audio */
        .audio-btn {
            background-color: #f1f5f9;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #64748b;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">⬅️</button>
        <div>jàngale</div>
        <div class="logo-tag">JÀNGALE</div>
    </div>

    <!-- Tab Leson yi -->
    <div class="tabs-container">
        <button class="tab-btn active" id="btn-voyelles" onclick="switchLeson('voyelles')">(Leson 1)</button>
        <button class="tab-btn" id="btn-consonnes" onclick="switchLeson('consonnes')">(Leson 2)</button>
    </div>

    <!-- Fi araf yi di toftaloo ci suuf -->
    <div class="araf-list" id="araf-container"></div>
</div>

<script>
    // Limu Voyel yi (Leson 1)
    const voyelles = [
        { araf: "A", misaal: "Amoo", wax: "Ah", son: "audio/araf_a.mp3" },
        { araf: "E", misaal: "Eskee", wax: "É", son: "audio/araf_e.mp3" },
        { araf: "Ë", misaal: "Ëtt", wax: "Eu", son: "audio/araf_ee.mp3" },
        { araf: "I", misaal: "Ite", wax: "I", son: "audio/araf_i.mp3" },
        { araf: "O", misaal: "Oolo", wax: "O", son: "audio/araf_o.mp3" },
        { araf: "U", misaal: "Ubi", wax: "U", son: "audio/araf_u.mp3" }
    ];

    // Limu Koonsoo yi (Leson 2)
    const consonnes = [
        { araf: "B", misaal: "Boon", wax: "Bë", son: "audio/araf_b.mp3" },
        { araf: "C", misaal: "Ceeb", wax: "Cë", son: "audio/araf_c.mp3" },
        { araf: "D", misaal: "Daba", wax: "Dë", son: "audio/araf_d.mp3" },
        { araf: "F", misaal: "Fas", wax: "Fë", son: "audio/araf_f.mp3" },
        { araf: "G", misaal: "Góor", wax: "Gë", son: "audio/araf_g.mp3" },
        { araf: "H", misaal: "Habsatou", wax: "Hë", son: "audio/araf_h.mp3" },
        { araf: "J", misaal: "Jërëjëf", wax: "Jë", son: "audio/araf_j.mp3" },
        { araf: "K", misaal: "Kër", wax: "Kë", son: "audio/araf_k.mp3" },
        { araf: "L", misaal: "Lakk", wax: "Lë", son: "audio/araf_l.mp3" },
        { araf: "M", misaal: "Mbaar", wax: "Më", son: "audio/araf_m.mp3" },
        { araf: "N", misaal: "Nit", wax: "Në", son: "audio/araf_n.mp3" },
        { araf: "Ñ", misaal: "Ñari", wax: "Ñë", son: "audio/araf_gn.mp3" },
        { araf: "Ŋ", misaal: "Ŋam", wax: "Ŋë", son: "audio/araf_ng.mp3" },
        { araf: "P", misaal: "Picc", wax: "Pë", son: "audio/araf_p.mp3" },
        { araf: "Q", misaal: "Qaat", wax: "Që", son: "audio/araf_q.mp3" },
        { araf: "R", misaal: "Ragal", wax: "Rë", son: "audio/araf_r.mp3" },
        { araf: "S", misaal: "Suf", wax: "Së", son: "audio/araf_s.mp3" },
        { araf: "T", misaal: "Tund", wax: "Të", son: "audio/araf_t.mp3" },
        { araf: "W", misaal: "Waaw", wax: "Wë", son: "audio/araf_w.mp3" },
        { araf: "X", misaal: "Xale", wax: "Xë", son: "audio/araf_x.mp3" },
        { araf: "Y", misaal: "Yaram", wax: "Yë", son: "audio/araf_y.mp3" }
    ];

    const container = document.getElementById("araf-container");

    // Fonction buy wone liste bi mu toftaloo ci suuf
    function woneArafYi(liste) {
        container.innerHTML = ""; 
        
        liste.forEach(item => {
            const card = document.createElement("div");
            card.className = "araf-card";
            
            card.innerHTML = `
                <div class="card-left">
                    <h1 class="araf-main">${item.araf}</h1>
                    <div class="misaal-container">
                        <span class="misaal-label">Misaal:</span>
                        <span class="misaal-text">${item.misaal}</span>
                    </div>
                </div>
                <button class="audio-btn">🔊</button>
            `;
            
            card.onclick = () => {
                playAudio(item.son, item.wax);
            };
            
            container.appendChild(card);
        });
    }

    // Fonction buy soppi Leson bi
    function switchLeson(type) {
        document.getElementById("btn-voyelles").classList.remove("active");
        document.getElementById("btn-consonnes").classList.remove("active");

        if (type === 'voyelles') {
            document.getElementById("btn-voyelles").classList.add("active");
            woneArafYi(voyelles);
        } else {
            document.getElementById("btn-consonnes").classList.add("active");
            woneArafYi(consonnes);
        }
    }

    // Fonction buy déglu son bi
    function playAudio(audioPath, arafWax) {
        const audio = new Audio(audioPath);
        audio.play().catch(err => {
            console.log("Audio file amul, sàkk naa robot text-to-speech.");
            const utterance = new SpeechSynthesisUtterance(arafWax);
            utterance.lang = 'fr-FR'; 
            window.speechSynthesis.speak(utterance);
        });
    }

    // Dóoral liggéey bi ak Voyelles (Leson 1)
    woneArafYi(voyelles);
</script>

</body>
</html>

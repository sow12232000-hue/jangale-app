<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jàng Français ci Wolof</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }
        .grid-leson {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card-audio {
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .card-audio:hover {
            transform: scale(1.02);
            background-color: #fcfcfc;
        }
        .icon-audio {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- LESON 1 -->
    <h2>Leson 1 : Boolee Araf yi</h2>
    <div class="grid-leson">
        <button class="card-audio" onclick="playAudio('ba.mp3')">b -> (ba) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('be.mp3')">b -> (be) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bi.mp3')">b -> (bi) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bo.mp3')">b -> (bo) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bu.mp3')">b -> (bu) <span class="icon-audio">🔊</span></button>
    </div>

    <!-- LESON 2: 20 BAAT YI -->
    <h2>Leson 2 : 20 Baat yu am solo</h2>
    <div class="grid-leson">
        
        <!-- 1-5 -->
        <button class="card-audio" onclick="playAudio('soleil.mp3')">Soleil -> (Jant) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('chapeau.mp3')">Chapeau -> (Mbaxana) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bouteille.mp3')">Bouteille -> (Bitel) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('chaise.mp3')">Chaise -> (Toogu) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('table.mp3')">Table -> (Taabal) <span class="icon-audio">🔊</span></button>

        <!-- 6-10 -->
        <button class="card-audio" onclick="playAudio('fenetre.mp3')">Fenêtre -> (Palanteer) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('voiture.mp3')">Voiture -> (Woto) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('maison.mp3')">Maison -> (Kër) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('enfant.mp3')">Enfant -> (Xale) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('livre.mp3')">Livre -> (Téere) <span class="icon-audio">🔊</span></button>

        <!-- 11-15 -->
        <button class="card-audio" onclick="playAudio('cahier.mp3')">Cahier -> (Kaye) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('stylo.mp3')">Stylo -> (Bik) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('chien.mp3')">Chien -> (Xaj) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('chat.mp3')">Chat -> (Muus) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('eau.mp3')">Eau -> (Ndox) <span class="icon-audio">🔊</span></button>

        <!-- 16-20 -->
        <button class="card-audio" onclick="playAudio('pain.mp3')">Pain -> (Mburu) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('poisson.mp3')">Poisson -> (Jën) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('viande.mp3')">Viande -> (Yapp) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('vetement.mp3')">Vêtement -> (Yere) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('chaussure.mp3')">Chaussure -> (Dall) <span class="icon-audio">🔊</span></button>

    </div>

</div>

<script>
    function playAudio(nomFichier) {
        var audio = new Audio('audio_fr/' + nomFichier);
        audio.play();
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jàng Français ci Wolof</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        /* Lii mooy bitoŋu dellu gannaaw bi */
        .btn-retour {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background-color: #333333;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .btn-retour:hover {
            background-color: #555555;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }
        .grid-leson {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card-audio {
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 17px;
            font-weight: bold;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .card-audio:hover {
            transform: scale(1.02);
            background-color: #fcfcfc;
        }
        .icon-audio {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">

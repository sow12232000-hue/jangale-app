<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jàng Français ci Wolof</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }
        .grid-leson {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card-audio {
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .card-audio:hover {
            transform: scale(1.02);
            background-color: #fcfcfc;
        }
        .icon-audio {
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- WÀLLU 1 : ALFABÉ BI (ALPHABET) -->
    <h2>Alfabé (Alphabet)</h2>
    <div class="grid-leson">
        <button class="card-audio" onclick="playAudio('a.mp3')">A -> (a) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('b.mp3')">B -> (bé) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('c.mp3')">C -> (sé) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('d.mp3')">D -> (dé) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('e.mp3')">E -> (e) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('f.mp3')">F -> (ef) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('g.mp3')">G -> (ji) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('h.mp3')">H -> (ach) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('i.mp3')">I -> (i) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('j.mp3')">J -> (ji) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('k.mp3')">K -> (ka) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('l.mp3')">L -> (el) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('m.mp3')">M -> (em) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('n.mp3')">N -> (en) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('o.mp3')">O -> (o) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('p.mp3')">P -> (pé) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('q.mp3')">Q -> (ky) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('r.mp3')">R -> (er) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('s.mp3')">S -> (es) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('t.mp3')">T -> (té) <span class="icon-audio">🔊</span></button>
    </div>

    <!-- WÀLLU 2 : BOOLEE ARAF YI PAR ÑAAR -->
    <h2>Leson 1 : Boolee Araf yi ñaar-ñaar</h2>
    <div class="grid-leson">
        <!-- B -->
        <button class="card-audio" onclick="playAudio('ba.mp3')">b + a -> (ba) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('be.mp3')">b + e -> (be) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bi.mp3')">b + i -> (bi) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bo.mp3')">b + o -> (bo) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bu.mp3')">b + u -> (bu) <span class="icon-audio">🔊</span></button>

        <!-- M -->
        <button class="card-audio" onclick="playAudio('ma.mp3')">m + a -> (ma) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('me.mp3')">m + e -> (me) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('mi.mp3')">m + i -> (mi) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('mo.mp3')">m + o -> (mo) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('mu.mp3')">m + u -> (mu) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('my.mp3')">m + y -> (mi) <span class="icon-audio">🔊</span></button>
    </div>

    <!-- WÀLLU 3 : BAAT YI NEKK CI SAY FOTO -->
    <h2>Leson 2 : Baat yu am solo yu bees</h2>
    <div class="grid-leson">
        <button class="card-audio" onclick="playAudio('Montagne.mp3')">Montagne -> (Tund) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('montagne.mp3')">montagne -> (Tund) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('bouteille.mp3')">Bouteille -> (Bitel) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('chapeau.mp3')">Chapeau -> (Mbaxana) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('cuisine.mp3')">Cuisine -> (Waañ) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('garcon.mp3')">Garçon -> (Xale bu góor) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('grenouille.mp3')">Grenouille -> (Mbott) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('oiseau.mp3')">Oiseau -> (Picc) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('papillon.mp3')">Papillon -> (Lëp-lëp) <span class="icon-audio">🔊</span></button>
        <button class="card-audio" onclick="playAudio('téléphone.mp3')">Téléphone -> (Telefoon) <span class="icon-audio">🔊</span></button>
    </div>

</div>

<script>
    function playAudio(nomFichier) {
        // Lii dafay wut sàqu odiyo yi ci biir dëtt bu tudd audio_fr
        var audio = new Audio('audio_fr/' + nomFichier);
        audio.play();
    }
</script>

</body>
</html>

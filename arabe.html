<!DOCTYPE html>
<html lang="wo">
<head>

    <title>Lësonu Araab</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        .back-btn { display: inline-block; background-color: #333; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; }

<body>

    <a href="index.html" class="back-btn">⬅ Dellu ginnaw</a>

    <div class="title">Lësonu Araabi - اللغة العربية</div>

        <div class="ar-text">مَرْحَبًا بِكُمْ</div>
        <div class="wo-text">
            <strong>Français:</strong> Bienvenue <br>
            <strong>Wolof:</strong> Dalal jamm ci lësonu Araab bi.
        </div>
    </div>

    <div class="rule-card">
        <div class="ar-text">كَيْفَ حَالُكَ؟</div>
        <div class="wo-text">

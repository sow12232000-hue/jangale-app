<!DOCTYPE html>

<head>

    <title>Jangale App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 16px;
        }

        .header {
            background-color: #1E2746;
            color: white;
            text-align: center;
            padding: 16px;
            font-weight: bold;
            font-size: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #1E2746;
            margin-bottom: 16px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }

        .grid-item {
            background-color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: black;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .circle-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .item-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .item-subtitle {
            font-size: 11px;
            color: grey;
        }

        .contact-title {
            font-size: 12px;
            font-weight: bold;
            color: grey;
            margin-bottom: 12px;
        }

        .button-container {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-wave {
            background-color: #19B4E5;
        }

        .btn-whatsapp {
            background-color: #25D366;
        }
    </style>
</head>

    <div class="header">JÀNGALE APP</div>

    <div class="grid-container">

            <div class="item-title">Anglais ci Wolof</div>
            <div class="item-subtitle">Lësonu Angale, kàddu yu am solo</div>
        </a>

        <a href="saadatut-tullab.html" class="grid-item">

      <div class="iten-title">عِلْمُ النَّحْوِ (Hilmun-Nahwu)</div>
<div class="item-subtitle">Jàng xam-xamu Nahwu ci Wolof</div>

            <div class="item-title">Français ci Wolof</div>
            <div class="item-subtitle">Français ngir Écool yi...</div>
        </a>

        <a href="arabe.html" class="grid-item">

<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jangale App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            padding: 16px;
        }
        .header {
            background-color: #1E2746;
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 15px;
            font-weight: bold;
            color: #1E2746;
            margin-bottom: 15px;
        }
        /* Fi la 4 karee jàngale yi di fete (Grid 2x2) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .grid-box {
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: black;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .box-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .box-desc {
            font-size: 11px;
            color: #777;
        }
        .divider {
            height: 1px;
            background-color: #ddd;
            margin-bottom: 20px;
        }
        /* Wàllu Paaymant ak Waxtaan */
        .contact-title {
            font-size: 13px;
            font-weight: bold;
            color: #777;
            margin-bottom: 10px;
        }
        .btn-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
        }
        .btn-wave {
            background-color: #19B4E5;
        }
        .btn-whatsapp {
            background-color: #25D366;
        }
    </style>
</head>
<body>

    <div class="header">JÀNGALE APP</div>
    
    <div class="section-title">SUJÉ YIY JÀNGALE (PROGRAMMES)</div>

    <!-- 4 Karee yi dëppoo ak sa yeneen fail yi -->
    <div class="grid-container">
        <a href="english.html" class="grid-box">
            <div class="icon-circle" style="background-color: #d0e8ff; color: #007bff;">📘</div>
            <div class="box-title">Anglais ci Wolof</div>
            <div class="box-desc">Lësonu Angale, kàddu yu am solo</div>
        </a>

        <a href="saadatut-tullab.html" class="grid-box">
            <div class="icon-circle" style="background-color: #ffe8cc; color: #ff9200;">🍊</div>
            <div class="box-title">سَعَادَةُ الطُّلَّابِ</div>
            <div class="box-desc">Sa'adatut Tullab bu Serigne Touba</div>
        </a>

        <a href="french.html" class="grid-box">
            <div class="icon-circle" style="background-color: #e3f9ff; color: #00a3cc;">📖</div>
            <div class="box-title">Français ci Wolof</div>
            <div class="box-desc">Français ngir Écool yi, jangkat yi</div>
        </a>

        <a href="arabe.html" class="grid-box">
            <div class="icon-circle" style="background-color: #d4edda; color: #28a745;">🟢</div>
            <div class="box-title">اللغة العربية (L'Arabe)</div>
            <div class="box-desc">Jàng kàddu yu am solo</div>
        </a>
    </div>

    <div class="divider"></div>

    <div class="contact-title">CONTACT & PAIEMENT</div>
    
    <!-- Bouton Wave ak WhatsApp yu lay fay walla di la jotoog -->
    <div class="btn-container">
        <a href="https://wave.com" class="btn btn-wave" target="_blank">
            💰 Fay ci Wave
        </a>
        <a href="https://wa.me" class="btn btn-whatsapp" target="_blank">
            💬 WhatsApp
        </a>
    </div>

</body>
</html>

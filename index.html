<!DOCTYPE html>
<html lang="wo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jàngale App - Faransé / Wolof</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        #pay-screen { display: block; }
        .wave-box { background-color: #f0f7ff; border: 2px dashed #00a4e4; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .bold { font-weight: bold; color: #00a4e4; }
        input[type="text"] { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn { background-color: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-wa { background-color: #25d366; margin-top: 10px; }
        
        /* Contenu de l'application (Affiché directement pour débloquer la navigation) */
        #app-content { display: block; }
        
        /* Style des liens et des cartes */
        .lesson-link { text-decoration: none; color: inherit; display: block; margin-bottom: 15px; }
        .lesson-card { background-color: #ecf0f1; padding: 15px; border-radius: 8px; border-left: 6px solid #3498db; text-align: left; transition: transform 0.2s; }
        .lesson-card:hover { transform: scale(1.02); }
        .fr { font-weight: bold; color: #e74c3c; font-size: 16px; }
        .wo { font-weight: bold; color: #27ae60; margin-top: 5px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JÀNGALE APP</h1>
        <p class="subtitle">Faransé – Wolof ngir Écool yi & Jangkat yi</p>

        <!-- CONTENT DE L'APPLICATION -->
        <div id="app-content">
            <p style="color: #27ae60; font-weight: bold;">🎉 Alhamdouliilah! Léegi nga ngi ci biir sa Jàngale App.</p>
            
            <!-- CARTE 1: ÉCOLE -->
            <a href="ecole.html" class="lesson-link">
                <div class="lesson-card">
                    <div class="fr">Français: L'école</div>
                    <div class="wo">Wolof: Écool bi / Jàngu jé</div>
                </div>
            </a>

            <!-- CARTE 2: LIVRE -->
            <a href="livre.html" class="lesson-link">
                <div class="lesson-card">
                    <div class="fr">Français: Le livre</div>
                    <div class="wo">Wolof: Téere bi</div>
                </div>
            </a>

            <!-- CARTE 3: ÉLÈVE -->
            <a href="eleve.html" class="lesson-link">
                <div class="lesson-card">
                    <div class="fr">Français: L'élève apprend sa leçon.</div>
                    <div class="wo">Wolof: Ndongo bi mu ngiy jàng lësonam.</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
